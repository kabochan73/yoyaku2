services:
  # PHP-FPM (Laravel)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yoyaku_backend
    volumes:
      - ./backend:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      - APP_ENV=local
    depends_on:
      db:
        condition: service_healthy
    networks:
      - yoyaku_network

  # Next.js
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: yoyaku_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - yoyaku_network

  # Nginx
  nginx:
    image: nginx:alpine
    container_name: yoyaku_nginx
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - yoyaku_network

  # PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: yoyaku_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: yoyaku
      POSTGRES_USER: yoyaku_user
      POSTGRES_PASSWORD: yoyaku_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yoyaku_user -d yoyaku"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - yoyaku_network

  # Mailpit (ローカルメール確認用)
  mailpit:
    image: axllent/mailpit:latest
    container_name: yoyaku_mailpit
    ports:
      - "8025:8025"  # Web UI
      - "1025:1025"  # SMTP
    networks:
      - yoyaku_network

volumes:
  postgres_data:

networks:
  yoyaku_network:
    driver: bridge
